<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnable — 点击学习，无限生长</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #faf8f5;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #canvas {
      display: block;
      cursor: grab;
      background: #faf8f5;
    }
    #canvas:active { cursor: grabbing; }

    /* UI Overlay */
    .ui-overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .ui-overlay > * { pointer-events: auto; }
    .brand {
      font-size: 24px;
      font-weight: 700;
      color: #4a4036;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #a09488;
      margin-bottom: 16px;
    }
    .search-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-box input {
      width: 260px;
      padding: 10px 14px;
      border: 1.5px solid #e8d5c4;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
      color: #4a4036;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #ffcc80; }
    .search-box input::placeholder { color: #c4b8a8; }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #ffcc80;
      color: #4a4036;
    }
    .btn-primary:hover { background: #ffb74d; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 20px 32px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(74, 64, 54, 0.12);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 100;
      font-size: 14px;
      color: #4a4036;
    }
    .loading.active { display: flex; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e8d5c4;
      border-top-color: #ffcc80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hint */
    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      color: #a09488;
      box-shadow: 0 2px 12px rgba(74, 64, 54, 0.06);
      z-index: 10;
      pointer-events: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(74, 64, 54, 0.1);
      font-size: 13px;
      color: #4a4036;
      z-index: 100;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Detail Panel */
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      max-width: 90vw;
      height: 100vh;
      background: #fff;
      box-shadow: -4px 0 32px rgba(74, 64, 54, 0.1);
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-panel.open { transform: translateX(0); }

    .detail-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid #f0ebe5;
    }
    .detail-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #4a4036;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .detail-header .parent-tag {
      font-size: 12px;
      color: #a09488;
      background: #faf8f5;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
    }
    .detail-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      border: none;
      background: #faf8f5;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      color: #8a7e72;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .detail-close:hover { background: #f0ebe5; color: #4a4036; }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .detail-section {
      margin-bottom: 24px;
    }
    .detail-section h3 {
      font-size: 13px;
      font-weight: 600;
      color: #a09488;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.7;
      color: #4a4036;
    }
    .detail-section ul {
      list-style: none;
      padding: 0;
    }
    .detail-section li {
      font-size: 14px;
      line-height: 1.7;
      color: #4a4036;
      padding: 6px 0 6px 20px;
      position: relative;
    }
    .detail-section li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 14px;
      width: 6px;
      height: 6px;
      background: #ffcc80;
      border-radius: 50%;
    }
    .detail-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px;
      color: #a09488;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="ui-overlay">
    <div class="brand">Learnable</div>
    <div class="subtitle">单击展开知识树 · 双击查看详情</div>
    <div class="search-box">
      <input type="text" id="topicInput" placeholder="输入一个主题，比如“机器学习”..." value="机器学习">
      <button class="btn btn-primary" id="startBtn">开始学习</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>正在生成知识点...</span>
  </div>

  <div class="hint" id="hint">滚轮缩放 · 拖拽移动 · 单击展开子节点 · 双击查看详情</div>

  <div class="toast" id="toast"></div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">×</button>
    <div class="detail-header">
      <h2 id="detailTitle">节点标题</h2>
      <span class="parent-tag" id="detailParent">属于：根节点</span>
    </div>
    <div class="detail-body" id="detailBody">
      <div class="detail-loading">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    // ============================================================
    // Learnable Frontend — Infinite Canvas Knowledge Tree
    // v0.2: click-to-expand, double-click-for-detail, concurrent detail loading
    // ============================================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loadingEl = document.getElementById('loading');
    const toastEl = document.getElementById('toast');
    const hintEl = document.getElementById('hint');
    const detailPanel = document.getElementById('detailPanel');
    const detailTitle = document.getElementById('detailTitle');
    const detailParent = document.getElementById('detailParent');
    const detailBody = document.getElementById('detailBody');
    const detailClose = document.getElementById('detailClose');

    const API_BASE = window.location.origin.includes('localhost')
      ? 'http://localhost:8080'
      : '';

    const COLORS = {
      bg: '#faf8f5',
      nodeBg: '#fff9f0',
      nodeBorder: '#e8d5c4',
      nodeBorderHover: '#ffcc80',
      nodeBorderActive: '#ffb74d',
      nodeBorderDetailLoaded: '#81c784',
      text: '#4a4036',
      textSecondary: '#8a7e72',
      edge: '#d4c4b0',
      edgeActive: '#ffcc80',
      shadow: 'rgba(74, 64, 54, 0.08)',
    };

    const camera = { x: 0, y: 0, zoom: 1, targetZoom: 1, targetX: 0, targetY: 0 };
    const nodes = new Map();
    const edges = [];
    let hoveredNode = null;
    let selectedNode = null;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let lastMouse = { x: 0, y: 0 };
    let animating = false;
    let detailOpen = false;

    // Node class with detail support
    class Node {
      constructor(id, label, x, y, parentId = null) {
        this.id = id;
        this.label = label;
        this.x = x;
        this.y = y;
        this.targetX = x;
        this.targetY = y;
        this.width = 0;
        this.height = 0;
        this.parentId = parentId;
        this.children = [];
        this.expanded = false;
        this.expanding = false;
        this.opacity = 0;
        this.targetOpacity = 1;
        this.scale = 0.5;
        this.targetScale = 1;
        this.level = parentId ? (nodes.get(parentId)?.level || 0) + 1 : 0;

        // Detail fields
        this.detail = null;           // { definition, key_points, example }
        this.detailLoaded = false;
        this.detailLoading = false;
      }

      measure(ctx) {
        ctx.font = `600 14px -apple-system, BlinkMacSystemFont, sans-serif`;
        const lines = this.wrapText(ctx, this.label, 180);
        this.width = Math.min(Math.max(...lines.map(l => ctx.measureText(l).width)) + 32, 220);
        this.height = lines.length * 22 + 24;
        this.lines = lines;
      }

      wrapText(ctx, text, maxWidth) {
        const chars = text.split('');
        const lines = [];
        let line = '';
        for (const ch of chars) {
          const test = line + ch;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = ch;
          } else {
            line = test;
          }
        }
        lines.push(line);
        return lines;
      }

      getBounds() {
        return {
          left: this.x - this.width / 2,
          top: this.y - this.height / 2,
          right: this.x + this.width / 2,
          bottom: this.y + this.height / 2,
        };
      }

      contains(worldX, worldY) {
        const b = this.getBounds();
        return worldX >= b.left && worldX <= b.right && worldY >= b.top && worldY <= b.bottom;
      }
    }

    // Layout
    function calculateRadialLayout(parentNode, childCount, radius = 180) {
      const results = [];
      if (childCount === 0) return results;
      const angleSpan = Math.min(Math.PI * 1.2, Math.PI * 2 * childCount / 8);
      const startAngle = -Math.PI / 2 - angleSpan / 2;
      for (let i = 0; i < childCount; i++) {
        const angle = startAngle + (angleSpan / Math.max(childCount - 1, 1)) * i;
        results.push({
          x: parentNode.x + Math.cos(angle) * radius,
          y: parentNode.y + Math.sin(angle) * radius,
        });
      }
      return results;
    }

    // Animation loop
    function animate() {
      let needsUpdate = false;
      camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;
      camera.x += (camera.targetX - camera.x) * 0.1;
      camera.y += (camera.targetY - camera.y) * 0.1;

      for (const node of nodes.values()) {
        if (Math.abs(node.x - node.targetX) > 0.5) {
          node.x += (node.targetX - node.x) * 0.12;
          needsUpdate = true;
        }
        if (Math.abs(node.y - node.targetY) > 0.5) {
          node.y += (node.targetY - node.y) * 0.12;
          needsUpdate = true;
        }
        if (Math.abs(node.opacity - node.targetOpacity) > 0.01) {
          node.opacity += (node.targetOpacity - node.opacity) * 0.08;
          needsUpdate = true;
        }
        if (Math.abs(node.scale - node.targetScale) > 0.01) {
          node.scale += (node.targetScale - node.scale) * 0.1;
          needsUpdate = true;
        }
      }

      if (needsUpdate || animating) {
        render();
        requestAnimationFrame(animate);
      } else {
        animating = false;
      }
    }

    function startAnimation() {
      if (!animating) {
        animating = true;
        requestAnimationFrame(animate);
      }
    }

    // Rendering
    function render() {
      const w = canvas.width = window.innerWidth;
      const h = canvas.height = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, w, h);
      ctx.save();
      ctx.translate(w / 2 + camera.x, h / 2 + camera.y);
      ctx.scale(camera.zoom, camera.zoom);
      drawGrid(ctx, w, h);
      for (const edge of edges) drawEdge(ctx, edge);
      for (const node of nodes.values()) drawNode(ctx, node);
      ctx.restore();
    }

    function drawGrid(ctx, w, h) {
      const step = 40;
      const offsetX = (camera.x + w / 2) % step;
      const offsetY = (camera.y + h / 2) % step;
      ctx.save();
      ctx.strokeStyle = 'rgba(212, 196, 176, 0.15)';
      ctx.lineWidth = 1;
      for (let x = -w / 2 - offsetX; x < w / 2; x += step) {
        ctx.beginPath(); ctx.moveTo(x, -h / 2); ctx.lineTo(x, h / 2); ctx.stroke();
      }
      for (let y = -h / 2 - offsetY; y < h / 2; y += step) {
        ctx.beginPath(); ctx.moveTo(-w / 2, y); ctx.lineTo(w / 2, y); ctx.stroke();
      }
      ctx.restore();
    }

    function drawEdge(ctx, edge) {
      const from = nodes.get(edge.from);
      const to = nodes.get(edge.to);
      if (!from || !to) return;
      const opacity = Math.min(from.opacity, to.opacity);
      if (opacity < 0.01) return;
      ctx.save();
      ctx.globalAlpha = opacity;
      const active = edge.from === hoveredNode?.id || edge.to === hoveredNode?.id;
      ctx.strokeStyle = active ? COLORS.edgeActive : COLORS.edge;
      ctx.lineWidth = active ? 2.5 : 1.5;
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const cpOffset = dist * 0.3;
      ctx.beginPath();
      ctx.moveTo(from.x, from.y + from.height / 2);
      ctx.bezierCurveTo(
        from.x, from.y + from.height / 2 + cpOffset,
        to.x, to.y - to.height / 2 - cpOffset,
        to.x, to.y - to.height / 2
      );
      ctx.stroke();
      ctx.restore();
    }

    function drawNode(ctx, node) {
      if (node.opacity < 0.01) return;
      node.measure(ctx);
      const bounds = node.getBounds();
      ctx.save();
      ctx.globalAlpha = node.opacity;
      const cx = node.x, cy = node.y;
      const sx = node.scale, sy = node.scale;
      ctx.translate(cx, cy);
      ctx.scale(sx, sy);
      ctx.translate(-cx, -cy);

      // Shadow
      ctx.shadowColor = COLORS.shadow;
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 4;
      ctx.fillStyle = COLORS.nodeBg;
      roundRect(ctx, bounds.left, bounds.top, node.width, node.height, 12);
      ctx.fill();
      ctx.shadowColor = 'transparent';

      // Border color
      const isHovered = node === hoveredNode;
      const isSelected = node === selectedNode;
      let borderColor = COLORS.nodeBorder;
      if (node.detailLoaded) borderColor = COLORS.nodeBorderDetailLoaded;
      if (isHovered) borderColor = COLORS.nodeBorderHover;
      if (isSelected) borderColor = COLORS.nodeBorderActive;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = (isHovered || isSelected) ? 2.5 : 1.5;
      roundRect(ctx, bounds.left, bounds.top, node.width, node.height, 12);
      ctx.stroke();

      // Text
      ctx.fillStyle = COLORS.text;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `600 14px -apple-system, BlinkMacSystemFont, sans-serif`;
      const lineHeight = 22;
      const startY = node.y - (node.lines.length - 1) * lineHeight / 2;
      for (let i = 0; i < node.lines.length; i++) {
        ctx.fillText(node.lines[i], node.x, startY + i * lineHeight);
      }

      // Detail loaded indicator (small green dot)
      if (node.detailLoaded) {
        ctx.fillStyle = '#81c784';
        ctx.beginPath();
        ctx.arc(node.x + node.width / 2 - 6, node.y - node.height / 2 + 6, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Detail loading indicator (small spinner)
      if (node.detailLoading) {
        ctx.strokeStyle = '#ffcc80';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const angle = Date.now() / 200;
        ctx.arc(node.x + node.width / 2 - 6, node.y - node.height / 2 + 6, 3, angle, angle + 1.5);
        ctx.stroke();
      }

      // Expand indicator (orange dot for expandable)
      if (!node.expanded && !node.expanding && !node.detailLoading) {
        ctx.fillStyle = '#ffcc80';
        ctx.beginPath();
        ctx.arc(node.x + node.width / 2 - 6, node.y + node.height / 2 - 6, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // Input handling
    function screenToWorld(sx, sy) {
      const w = canvas.width, h = canvas.height;
      return {
        x: (sx - w / 2 - camera.x) / camera.zoom,
        y: (sy - h / 2 - camera.y) / camera.zoom,
      };
    }

    // Click = expand
    canvas.addEventListener('click', e => {
      if (isDragging) return;
      const world = screenToWorld(e.clientX, e.clientY);
      const clicked = findNodeAt(world.x, world.y);
      if (clicked && !clicked.expanded && !clicked.expanding) {
        expandNode(clicked);
      }
    });

    // Double click = show detail
    canvas.addEventListener('dblclick', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      const clicked = findNodeAt(world.x, world.y);
      if (clicked) {
        showDetail(clicked);
      }
    });

    canvas.addEventListener('mousedown', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      const clicked = findNodeAt(world.x, world.y);
      if (clicked) return;
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      lastMouse = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('mousemove', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      hoveredNode = findNodeAt(world.x, world.y);
      canvas.style.cursor = hoveredNode ? 'pointer' : (isDragging ? 'grabbing' : 'grab');
      if (isDragging) {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        camera.targetX += dx;
        camera.targetY += dy;
        startAnimation();
      }
      lastMouse = { x: e.clientX, y: e.clientY };
      if (hoveredNode) render();
    });

    canvas.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      camera.targetZoom = Math.max(0.2, Math.min(3, camera.targetZoom * zoomFactor));
      startAnimation();
    }, { passive: false });

    function findNodeAt(x, y) {
      for (const node of nodes.values()) {
        if (node.contains(x, y) && node.opacity > 0.5) return node;
      }
      return null;
    }

    // Expansion logic: 1 LLM call for items, then concurrent detail calls
    async function expandNode(parentNode) {
      if (parentNode.expanding || parentNode.expanded) return;
      parentNode.expanding = true;
      showLoading(true);

      try {
        // Step 1: Get item list
        const res = await fetch(`${API_BASE}/api/expand`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: parentNode.label, language: 'zh' }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = data.items || [];

        // Step 2: Create child nodes immediately (with positions)
        const positions = calculateRadialLayout(parentNode, items.length);
        const childIds = [];

        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          const id = `${parentNode.id}-${item.id || i}`;
          const node = new Node(id, item.label, parentNode.x, parentNode.y, parentNode.id);
          node.targetX = positions[i].x;
          node.targetY = positions[i].y;
          node.opacity = 0;
          node.targetOpacity = 1;
          node.scale = 0.3;
          node.targetScale = 1;
          nodes.set(id, node);
          edges.push({ from: parentNode.id, to: id });
          parentNode.children.push(id);
          childIds.push(id);
        }

        parentNode.expanded = true;
        showLoading(false);
        startAnimation();
        showToast(`已展开 "${parentNode.label}" 的 ${items.length} 个子知识点，正在并发加载详情...`);

        // Step 3: Concurrent detail loading for each child
        const detailPromises = childIds.map(async (childId, idx) => {
          const childNode = nodes.get(childId);
          if (!childNode) return;
          childNode.detailLoading = true;
          startAnimation(); // trigger spinner render

          try {
            const detailRes = await fetch(`${API_BASE}/api/detail`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                topic: childNode.label,
                parent: parentNode.label,
                language: 'zh',
              }),
            });
            if (!detailRes.ok) throw new Error(`detail HTTP ${detailRes.status}`);
            const detailData = await detailRes.json();
            childNode.detail = {
              definition: detailData.definition,
              key_points: detailData.key_points,
              example: detailData.example,
            };
            childNode.detailLoaded = true;
          } catch (err) {
            console.error('Detail load failed for', childNode.label, err);
            childNode.detail = {
              definition: `${childNode.label}是${parentNode.label}的重要组成部分。`,
              key_points: ['核心原理', '实际应用', '发展趋势'],
              example: `例如，在${parentNode.label}领域中${childNode.label}被广泛应用。`,
            };
            childNode.detailLoaded = true;
          } finally {
            childNode.detailLoading = false;
          }
        });

        await Promise.all(detailPromises);
        showToast(`已加载 ${items.length} 个知识点的详情，双击查看`);
        render();

      } catch (err) {
        console.error('Expand failed:', err);
        showToast('展开失败，使用本地模拟数据');
        _mockExpand(parentNode);
      } finally {
        parentNode.expanding = false;
        showLoading(false);
      }
    }

    function _mockExpand(parentNode) {
      const mockItems = [
        { id: '1', label: `${parentNode.label} 基础` },
        { id: '2', label: `${parentNode.label} 应用` },
        { id: '3', label: `${parentNode.label} 进阶` },
      ];
      const positions = calculateRadialLayout(parentNode, mockItems.length);
      for (let i = 0; i < mockItems.length; i++) {
        const id = `${parentNode.id}-mock-${mockItems[i].id}`;
        const node = new Node(id, mockItems[i].label, parentNode.x, parentNode.y, parentNode.id);
        node.targetX = positions[i].x;
        node.targetY = positions[i].y;
        node.opacity = 0; node.targetOpacity = 1;
        node.scale = 0.3; node.targetScale = 1;
        node.detail = {
          definition: `${mockItems[i].label}是${parentNode.label}的重要组成部分。`,
          key_points: ['核心原理', '实际应用', '发展趋势'],
          example: `例如，在${parentNode.label}领域中${mockItems[i].label}被广泛应用。`,
        };
        node.detailLoaded = true;
        nodes.set(id, node);
        edges.push({ from: parentNode.id, to: id });
        parentNode.children.push(id);
      }
      parentNode.expanded = true;
      startAnimation();
    }

    // Detail panel
    function showDetail(node) {
      selectedNode = node;
      detailOpen = true;
      detailPanel.classList.add('open');
      detailTitle.textContent = node.label;
      detailParent.textContent = `属于：${node.parentId ? nodes.get(node.parentId)?.label || '未知' : '根节点'}`;

      if (node.detailLoaded && node.detail) {
        renderDetailBody(node.detail);
      } else if (!node.detailLoading) {
        detailBody.innerHTML = '<div class="detail-loading"><div class="spinner"></div><span>加载中...</span></div>';
        // Lazy load detail if not loaded
        loadDetailLazy(node);
      } else {
        detailBody.innerHTML = '<div class="detail-loading"><div class="spinner"></div><span>加载中...</span></div>';
      }
      render();
    }

    async function loadDetailLazy(node) {
      if (node.detailLoading || node.detailLoaded) return;
      node.detailLoading = true;
      render();

      try {
        const res = await fetch(`${API_BASE}/api/detail`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic: node.label,
            parent: node.parentId ? nodes.get(node.parentId)?.label || '' : '',
            language: 'zh',
          }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        node.detail = {
          definition: data.definition,
          key_points: data.key_points,
          example: data.example,
        };
        node.detailLoaded = true;
        if (selectedNode === node) {
          renderDetailBody(node.detail);
        }
      } catch (err) {
        node.detail = {
          definition: `${node.label}是一个重要的知识概念。`,
          key_points: ['核心原理', '实际应用', '发展趋势'],
          example: `例如，在实际项目中运用${node.label}解决了复杂问题。`,
        };
        node.detailLoaded = true;
        if (selectedNode === node) {
          renderDetailBody(node.detail);
        }
      } finally {
        node.detailLoading = false;
        render();
      }
    }

    function renderDetailBody(detail) {
      const kpList = detail.key_points?.map(kp => `<li>${kp}</li>`).join('') || '';
      detailBody.innerHTML = `
        <div class="detail-section">
          <h3>定义</h3>
          <p>${detail.definition || '暂无定义'}</p>
        </div>
        <div class="detail-section">
          <h3>核心要点</h3>
          <ul>${kpList || '<li>暂无要点</li>'}</ul>
        </div>
        <div class="detail-section">
          <h3>实际案例</h3>
          <p>${detail.example || '暂无案例'}</p>
        </div>
      `;
    }

    function closeDetail() {
      detailOpen = false;
      selectedNode = null;
      detailPanel.classList.remove('open');
      render();
    }

    detailClose.addEventListener('click', closeDetail);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && detailOpen) closeDetail();
    });

    // UI helpers
    function showLoading(show) {
      loadingEl.classList.toggle('active', show);
    }
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    // Initialize root node
    function initRoot(topic) {
      nodes.clear();
      edges.length = 0;
      closeDetail();
      const root = new Node('root', topic, 0, 0);
      root.opacity = 1; root.scale = 1;
      root.targetOpacity = 1; root.targetScale = 1;
      nodes.set('root', root);
      camera.targetX = 0; camera.targetY = 0; camera.targetZoom = 1;
      render(); startAnimation();
      setTimeout(() => expandNode(root), 600);
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      const topic = document.getElementById('topicInput').value.trim();
      if (!topic) return;
      initRoot(topic);
      hintEl.textContent = `滚轮缩放 · 拖拽移动 · 单击展开 · 双击详情 | 当前: ${topic}`;
    });
    document.getElementById('topicInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('startBtn').click();
    });
    window.addEventListener('resize', () => render());

    // Initial render
    render();
    showToast('💡 输入主题后点击"开始学习"，单击节点展开，双击查看详情');
  </script>
</body>
</html>
