<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnable — 点击学习，无限生长</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #faf8f5;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #canvas {
      display: block;
      cursor: grab;
      background: #faf8f5;
    }
    #canvas:active { cursor: grabbing; }

    /* UI Overlay */
    .ui-overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .ui-overlay > * { pointer-events: auto; }
    .brand {
      font-size: 24px;
      font-weight: 700;
      color: #4a4036;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #a09488;
      margin-bottom: 16px;
    }
    .search-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-box input {
      width: 260px;
      padding: 10px 14px;
      border: 1.5px solid #e8d5c4;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
      color: #4a4036;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #ffcc80; }
    .search-box input::placeholder { color: #c4b8a8; }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #ffcc80;
      color: #4a4036;
    }
    .btn-primary:hover { background: #ffb74d; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 20px 32px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(74, 64, 54, 0.12);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 100;
      font-size: 14px;
      color: #4a4036;
    }
    .loading.active { display: flex; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e8d5c4;
      border-top-color: #ffcc80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hint */
    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      color: #a09488;
      box-shadow: 0 2px 12px rgba(74, 64, 54, 0.06);
      z-index: 10;
      pointer-events: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(74, 64, 54, 0.1);
      font-size: 13px;
      color: #4a4036;
      z-index: 100;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="ui-overlay">
    <div class="brand">Learnable</div>
    <div class="subtitle">点击知识点，探索无限关联</div>
    <div class="search-box">
      <input type="text" id="topicInput" placeholder="输入一个主题，比如“机器学习”..." value="机器学习">
      <button class="btn btn-primary" id="startBtn">开始学习</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>正在生成知识点...</span>
  </div>

  <div class="hint" id="hint">滚轮缩放 · 拖拽移动 · 点击节点展开</div>

  <div class="toast" id="toast"></div>

  <canvas id="canvas"></canvas>

  <script>
    // ============================================================
    // Learnable Frontend — Infinite Canvas Knowledge Tree
    // ============================================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loadingEl = document.getElementById('loading');
    const toastEl = document.getElementById('toast');
    const hintEl = document.getElementById('hint');

    // API endpoint (same origin for static hosting, or adjust for dev)
    const API_BASE = window.location.origin.includes('localhost')
      ? 'http://localhost:8080'
      : '';

    // Colors
    const COLORS = {
      bg: '#faf8f5',
      nodeBg: '#fff9f0',
      nodeBorder: '#e8d5c4',
      nodeBorderHover: '#ffcc80',
      nodeBorderActive: '#ffb74d',
      text: '#4a4036',
      textSecondary: '#8a7e72',
      edge: '#d4c4b0',
      edgeActive: '#ffcc80',
      shadow: 'rgba(74, 64, 54, 0.08)',
    };

    // Camera (view transform)
    const camera = {
      x: 0,
      y: 0,
      zoom: 1,
      targetZoom: 1,
      targetX: 0,
      targetY: 0,
    };

    // State
    const nodes = new Map();
    const edges = [];
    let hoveredNode = null;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let lastMouse = { x: 0, y: 0 };
    let animating = false;

    // Node class
    class Node {
      constructor(id, label, x, y, parentId = null) {
        this.id = id;
        this.label = label;
        this.description = '';
        this.x = x;
        this.y = y;
        this.targetX = x;
        this.targetY = y;
        this.width = 0;
        this.height = 0;
        this.parentId = parentId;
        this.children = [];
        this.expanded = false;
        this.expanding = false;
        this.opacity = 0;
        this.targetOpacity = 1;
        this.scale = 0.5;
        this.targetScale = 1;
        this.level = parentId ? (nodes.get(parentId)?.level || 0) + 1 : 0;
        this.hue = (this.level * 35) % 360;
      }

      measure(ctx) {
        ctx.font = `14px -apple-system, BlinkMacSystemFont, sans-serif`;
        const lines = this.wrapText(ctx, this.label, 180);
        this.width = Math.min(Math.max(...lines.map(l => ctx.measureText(l).width)) + 32, 220);
        this.height = lines.length * 22 + 24;
        this.lines = lines;
      }

      wrapText(ctx, text, maxWidth) {
        const words = text.split('');
        const lines = [];
        let line = '';
        for (const word of words) {
          const test = line + word;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        }
        lines.push(line);
        return lines;
      }

      getBounds() {
        return {
          left: this.x - this.width / 2,
          top: this.y - this.height / 2,
          right: this.x + this.width / 2,
          bottom: this.y + this.height / 2,
        };
      }

      contains(worldX, worldY) {
        const b = this.getBounds();
        return worldX >= b.left && worldX <= b.right && worldY >= b.top && worldY <= b.bottom;
      }
    }

    // Layout
    function calculateRadialLayout(parentNode, childCount, radius = 180) {
      const results = [];
      if (childCount === 0) return results;

      const angleSpan = Math.min(Math.PI * 1.2, Math.PI * 2 * childCount / 8);
      const startAngle = -Math.PI / 2 - angleSpan / 2;

      for (let i = 0; i < childCount; i++) {
        const angle = startAngle + (angleSpan / Math.max(childCount - 1, 1)) * i;
        results.push({
          x: parentNode.x + Math.cos(angle) * radius,
          y: parentNode.y + Math.sin(angle) * radius,
        });
      }
      return results;
    }

    // Animation loop
    function animate() {
      let needsUpdate = false;

      // Camera smooth zoom/pan
      camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;
      camera.x += (camera.targetX - camera.x) * 0.1;
      camera.y += (camera.targetY - camera.y) * 0.1;

      // Node animations
      for (const node of nodes.values()) {
        if (Math.abs(node.x - node.targetX) > 0.5) {
          node.x += (node.targetX - node.x) * 0.12;
          needsUpdate = true;
        }
        if (Math.abs(node.y - node.targetY) > 0.5) {
          node.y += (node.targetY - node.y) * 0.12;
          needsUpdate = true;
        }
        if (Math.abs(node.opacity - node.targetOpacity) > 0.01) {
          node.opacity += (node.targetOpacity - node.opacity) * 0.08;
          needsUpdate = true;
        }
        if (Math.abs(node.scale - node.targetScale) > 0.01) {
          node.scale += (node.targetScale - node.scale) * 0.1;
          needsUpdate = true;
        }
      }

      if (needsUpdate || animating) {
        render();
        requestAnimationFrame(animate);
      } else {
        animating = false;
      }
    }

    function startAnimation() {
      if (!animating) {
        animating = true;
        requestAnimationFrame(animate);
      }
    }

    // Rendering
    function render() {
      const w = canvas.width = window.innerWidth;
      const h = canvas.height = window.innerHeight;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.translate(w / 2 + camera.x, h / 2 + camera.y);
      ctx.scale(camera.zoom, camera.zoom);

      // Grid (subtle)
      drawGrid(ctx, w, h);

      // Edges
      for (const edge of edges) {
        drawEdge(ctx, edge);
      }

      // Nodes
      for (const node of nodes.values()) {
        drawNode(ctx, node);
      }

      ctx.restore();
    }

    function drawGrid(ctx, w, h) {
      const step = 40;
      const offsetX = (camera.x + w / 2) % step;
      const offsetY = (camera.y + h / 2) % step;

      ctx.save();
      ctx.strokeStyle = 'rgba(212, 196, 176, 0.15)';
      ctx.lineWidth = 1;

      for (let x = -w / 2 - offsetX; x < w / 2; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, -h / 2);
        ctx.lineTo(x, h / 2);
        ctx.stroke();
      }
      for (let y = -h / 2 - offsetY; y < h / 2; y += step) {
        ctx.beginPath();
        ctx.moveTo(-w / 2, y);
        ctx.lineTo(w / 2, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawEdge(ctx, edge) {
      const from = nodes.get(edge.from);
      const to = nodes.get(edge.to);
      if (!from || !to) return;

      const opacity = Math.min(from.opacity, to.opacity);
      if (opacity < 0.01) return;

      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.strokeStyle = edge.from === hoveredNode?.id || edge.to === hoveredNode?.id ? COLORS.edgeActive : COLORS.edge;
      ctx.lineWidth = edge.from === hoveredNode?.id || edge.to === hoveredNode?.id ? 2.5 : 1.5;

      // Bezier curve
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const cpOffset = dist * 0.3;

      ctx.beginPath();
      ctx.moveTo(from.x, from.y + from.height / 2);
      ctx.bezierCurveTo(
        from.x, from.y + from.height / 2 + cpOffset,
        to.x, to.y - to.height / 2 - cpOffset,
        to.x, to.y - to.height / 2
      );
      ctx.stroke();

      // Arrow head
      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      ctx.fillStyle = ctx.strokeStyle;
      ctx.beginPath();
      ctx.moveTo(to.x, to.y - to.height / 2);
      ctx.lineTo(to.x - 6 * Math.cos(angle - 0.5), to.y - to.height / 2 - 6 * Math.sin(angle - 0.5));
      ctx.lineTo(to.x - 6 * Math.cos(angle + 0.5), to.y - to.height / 2 - 6 * Math.sin(angle + 0.5));
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawNode(ctx, node) {
      if (node.opacity < 0.01) return;

      node.measure(ctx);
      const bounds = node.getBounds();

      ctx.save();
      ctx.globalAlpha = node.opacity;

      const cx = node.x;
      const cy = node.y;
      const sx = node.scale;
      const sy = node.scale;

      ctx.translate(cx, cy);
      ctx.scale(sx, sy);
      ctx.translate(-cx, -cy);

      // Shadow
      ctx.shadowColor = COLORS.shadow;
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 4;

      // Background
      const isHovered = node === hoveredNode;
      const isExpanded = node.expanded;

      ctx.fillStyle = COLORS.nodeBg;
      roundRect(ctx, bounds.left, bounds.top, node.width, node.height, 12);
      ctx.fill();

      ctx.shadowColor = 'transparent';

      // Border
      ctx.strokeStyle = isExpanded ? COLORS.nodeBorderActive : (isHovered ? COLORS.nodeBorderHover : COLORS.nodeBorder);
      ctx.lineWidth = isHovered || isExpanded ? 2 : 1.5;
      roundRect(ctx, bounds.left, bounds.top, node.width, node.height, 12);
      ctx.stroke();

      // Text
      ctx.fillStyle = COLORS.text;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `600 14px -apple-system, BlinkMacSystemFont, sans-serif`;

      const lineHeight = 22;
      const startY = node.y - (node.lines.length - 1) * lineHeight / 2;

      for (let i = 0; i < node.lines.length; i++) {
        ctx.fillText(node.lines[i], node.x, startY + i * lineHeight);
      }

      // Expand indicator (dot)
      if (!node.expanded && !node.expanding) {
        ctx.fillStyle = '#ffcc80';
        ctx.beginPath();
        ctx.arc(node.x + node.width / 2 - 8, node.y + node.height / 2 - 8, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Description tooltip on hover
      if (isHovered && node.description) {
        ctx.fillStyle = 'rgba(74, 64, 54, 0.85)';
        const descWidth = Math.min(ctx.measureText(node.description).width + 20, 260);
        const descHeight = 30;
        roundRect(ctx, node.x - descWidth / 2, bounds.top - descHeight - 8, descWidth, descHeight, 6);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.font = '12px sans-serif';
        ctx.fillText(node.description, node.x, bounds.top - descHeight / 2 - 8);
      }

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // Input handling
    function screenToWorld(sx, sy) {
      const w = canvas.width;
      const h = canvas.height;
      return {
        x: (sx - w / 2 - camera.x) / camera.zoom,
        y: (sy - h / 2 - camera.y) / camera.zoom,
      };
    }

    canvas.addEventListener('mousedown', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      const clicked = findNodeAt(world.x, world.y);

      if (clicked) {
        if (!clicked.expanded && !clicked.expanding) {
          expandNode(clicked);
        }
        return;
      }

      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      lastMouse = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('mousemove', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      hoveredNode = findNodeAt(world.x, world.y);
      canvas.style.cursor = hoveredNode ? 'pointer' : (isDragging ? 'grabbing' : 'grab');

      if (isDragging) {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        camera.targetX += dx;
        camera.targetY += dy;
        startAnimation();
      }
      lastMouse = { x: e.clientX, y: e.clientY };

      if (hoveredNode) {
        render();
      }
    });

    canvas.addEventListener('mouseup', () => {
      isDragging = false;
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      camera.targetZoom = Math.max(0.2, Math.min(3, camera.targetZoom * zoomFactor));
      startAnimation();
    }, { passive: false });

    function findNodeAt(x, y) {
      for (const node of nodes.values()) {
        if (node.contains(x, y) && node.opacity > 0.5) {
          return node;
        }
      }
      return null;
    }

    // Expansion logic
    async function expandNode(parentNode) {
      if (parentNode.expanding || parentNode.expanded) return;
      parentNode.expanding = true;
      showLoading(true);

      try {
        const res = await fetch(`${API_BASE}/api/expand`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: parentNode.label, language: 'zh' }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const childNodes = data.nodes || [];
        const positions = calculateRadialLayout(parentNode, childNodes.length);

        for (let i = 0; i < childNodes.length; i++) {
          const cn = childNodes[i];
          const id = `${parentNode.id}-${cn.id}`;

          const node = new Node(id, cn.label, parentNode.x, parentNode.y, parentNode.id);
          node.description = cn.description || '';
          node.targetX = positions[i].x;
          node.targetY = positions[i].y;
          node.opacity = 0;
          node.targetOpacity = 1;
          node.scale = 0.3;
          node.targetScale = 1;

          nodes.set(id, node);
          edges.push({ from: parentNode.id, to: id });
          parentNode.children.push(id);
        }

        parentNode.expanded = true;
        showToast(`已展开 "${parentNode.label}" 的 ${childNodes.length} 个子知识点`);
        startAnimation();

      } catch (err) {
        console.error('Expand failed:', err);
        showToast('展开失败，使用本地模拟数据');

        // Fallback mock data
        const mockChildren = [
          { id: '1', label: `${parentNode.label} 基础`, description: '核心概念与原理' },
          { id: '2', label: `${parentNode.label} 应用`, description: '实际案例与场景' },
          { id: '3', label: `${parentNode.label} 进阶`, description: '高级技巧与优化' },
        ];
        const positions = calculateRadialLayout(parentNode, mockChildren.length);

        for (let i = 0; i < mockChildren.length; i++) {
          const cn = mockChildren[i];
          const id = `${parentNode.id}-mock-${cn.id}`;
          const node = new Node(id, cn.label, parentNode.x, parentNode.y, parentNode.id);
          node.description = cn.description;
          node.targetX = positions[i].x;
          node.targetY = positions[i].y;
          node.opacity = 0;
          node.targetOpacity = 1;
          node.scale = 0.3;
          node.targetScale = 1;
          nodes.set(id, node);
          edges.push({ from: parentNode.id, to: id });
          parentNode.children.push(id);
        }

        parentNode.expanded = true;
        startAnimation();
      } finally {
        parentNode.expanding = false;
        showLoading(false);
      }
    }

    // UI helpers
    function showLoading(show) {
      loadingEl.classList.toggle('active', show);
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    // Initialize root node
    function initRoot(topic) {
      nodes.clear();
      edges.length = 0;

      const root = new Node('root', topic, 0, 0);
      root.opacity = 1;
      root.scale = 1;
      root.targetOpacity = 1;
      root.targetScale = 1;
      nodes.set('root', root);

      camera.targetX = 0;
      camera.targetY = 0;
      camera.targetZoom = 1;

      render();
      startAnimation();

      // Auto-expand root after a short delay
      setTimeout(() => expandNode(root), 600);
    }

    // Start button
    document.getElementById('startBtn').addEventListener('click', () => {
      const topic = document.getElementById('topicInput').value.trim();
      if (!topic) return;
      initRoot(topic);
      hintEl.textContent = `滚轮缩放 · 拖拽移动 · 点击节点展开 | 当前主题: ${topic}`;
    });

    document.getElementById('topicInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        document.getElementById('startBtn').click();
      }
    });

    // Window resize
    window.addEventListener('resize', () => {
      render();
    });

    // Initial render
    render();
    showToast('💡 输入主题后点击"开始学习"，点击节点探索更多');
  </script>
</body>
</html>
