<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnable — 放大探索，层层深入</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Kalam', 'Ma Shan Zheng', 'ZCOOL KuaiLe', cursive;
      background: #faf6f0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #canvas {
      display: block;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }
    #canvas.cursor-pointer { cursor: pointer; }

    /* Minimal UI — handwritten style */
    .ui {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
    }
    .ui > * { pointer-events: auto; }
    .brand {
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
      font-size: 28px;
      font-weight: 700;
      color: #4a4036;
      letter-spacing: 1px;
      transform: rotate(-1.5deg);
      text-shadow: 2px 2px 0 rgba(212, 168, 83, 0.2);
    }
    .brand span { color: #c49a48; }
    .search {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      transform: rotate(0.5deg);
    }
    .search input {
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
      width: 230px;
      padding: 10px 14px;
      border: 2px solid #d4c4a8;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      color: #4a4036;
      transition: all 0.2s;
      box-shadow: 3px 3px 0 rgba(180, 160, 130, 0.2);
    }
    .search input:focus {
      border-color: #d4a853;
      box-shadow: 4px 4px 0 rgba(212, 168, 83, 0.25);
      transform: rotate(-0.5deg) translateY(-1px);
    }
    .search input::placeholder { color: #b8a88; opacity: 0.7; }
    .btn {
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
      padding: 10px 18px;
      border: 2px solid #c49a48;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #fff8e8;
      color: #8a6a2a;
      box-shadow: 3px 3px 0 rgba(180, 160, 130, 0.3);
      transition: all 0.15s;
      transform: rotate(-1deg);
    }
    .btn:hover {
      background: #ffeebb;
      transform: rotate(0deg) translateY(-2px);
      box-shadow: 4px 5px 0 rgba(180, 160, 130, 0.35);
    }
    .btn:active {
      transform: rotate(0deg) translateY(0);
      box-shadow: 1px 1px 0 rgba(180, 160, 130, 0.3);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Zoom hint — handwritten */
    .zoom-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) rotate(0.5deg);
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 22px;
      border-radius: 12px;
      font-size: 13px;
      color: #a09080;
      border: 1.5px dashed #d4c4a8;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    .zoom-hint.fade { opacity: 0; }

    /* Session panel */
    .session-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      background: #fff8e8;
      border: 2px solid #d4c4a8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 3px 3px 0 rgba(180,160,130,0.25);
      transition: all 0.2s;
      transform: rotate(2deg);
    }
    .session-btn:hover {
      background: #ffeebb;
      transform: rotate(0deg) translateY(-2px);
      box-shadow: 4px 5px 0 rgba(180,160,130,0.3);
    }
    .session-panel {
      position: fixed;
      top: 72px;
      right: 24px;
      width: 280px;
      background: #fffdf8;
      border: 2px solid #e0d5c8;
      border-radius: 12px;
      box-shadow: 4px 6px 0 rgba(160,140,110,0.15);
      z-index: 20;
      display: none;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
    }
    .session-panel.open { display: flex; }
    .session-header {
      padding: 14px 16px;
      border-bottom: 2px dashed #e8ddd0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 700;
      color: #4a4036;
    }
    .session-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #a09080;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .session-close:hover { background: #f0ebe5; color: #4a4036; }
    .session-body { padding: 12px 16px; max-height: 400px; overflow-y: auto; }
    .session-label {
      font-size: 11px;
      color: #a09080;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .session-topic {
      font-size: 15px;
      font-weight: 600;
      color: #4a4036;
      margin-bottom: 10px;
      padding: 6px 10px;
      background: #faf6f0;
      border-radius: 8px;
      border: 1.5px solid #e8ddd0;
    }
    .session-action {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #c49a48;
      border-radius: 8px;
      background: #fff8e8;
      color: #8a6a2a;
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(180,160,130,0.2);
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    .session-action:hover {
      background: #ffeebb;
      transform: translateY(-1px);
      box-shadow: 3px 3px 0 rgba(180,160,130,0.25);
    }
    .session-action.secondary {
      border-color: #b8a898;
      color: #7a6a5a;
      background: #faf6f0;
    }
    .session-action.secondary:hover { background: #f5efe8; }
    .session-divider {
      height: 2px;
      background: repeating-linear-gradient(90deg, #e8ddd0, #e8ddd0 6px, transparent 6px, transparent 10px);
      margin: 12px 0;
    }
    .session-list { display: flex; flex-direction: column; gap: 6px; }
    .session-item {
      padding: 8px 10px;
      background: #faf8f5;
      border: 1.5px solid #e8ddd0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-item:hover {
      background: #fff8e8;
      border-color: #d4c4a8;
      transform: translateX(2px);
    }
    .session-item-title { font-size: 14px; color: #4a4036; font-weight: 600; }
    .session-item-date { font-size: 11px; color: #a09080; }
    .session-item-delete {
      background: none;
      border: none;
      color: #c4a8a0;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      border-radius: 4px;
    }
    .session-item-delete:hover { background: #f8e8e8; color: #a06060; }
    .session-empty { font-size: 13px; color: #a09080; text-align: center; padding: 12px; }

    /* Loading — handwritten pencil dot */
    .loading {
      position: fixed;
      top: 28px;
      right: 28px;
      display: none;
      align-items: center;
      gap: 10px;
      font-family: 'Kalam', 'Ma Shan Zheng', cursive;
      font-size: 14px;
      color: #9a8a70;
      z-index: 10;
      transform: rotate(1deg);
    }
    .loading.active { display: flex; }
    .pencil {
      width: 20px;
      height: 20px;
      position: relative;
    }
    .pencil::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background: #d4a853;
      animation: scribble 0.6s ease-in-out infinite;
    }
    @keyframes scribble {
      0%, 100% { transform: translateX(0) scaleX(0.3); }
      50% { transform: translateX(8px) scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="brand">Learn<span>able</span></div>
    <div class="search">
      <input type="text" id="topic" placeholder="输入主题..." value="机器学习">
      <button class="btn" id="go">开始</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="pencil"></div>
    <span>正在思考...</span>
  </div>

  <!-- Session Panel -->
  <div class="session-btn" id="sessionBtn" title="保存/加载">✎</div>
  <div class="session-panel" id="sessionPanel">
    <div class="session-header">
      <span>我的笔记</span>
      <button class="session-close" id="sessionClose">×</button>
    </div>
    <div class="session-body">
      <div class="session-current">
        <div class="session-label">当前主题</div>
        <div class="session-topic" id="currentTopic">未开始</div>
        <button class="session-action" id="saveBtn">保存当前探索</button>
      </div>
      <div class="session-divider"></div>
      <div class="session-label">历史笔记</div>
      <div class="session-list" id="sessionList">
        <div class="session-empty">暂无保存的笔记</div>
      </div>
      <div class="session-divider"></div>
      <button class="session-action secondary" id="exportBtn">导出 JSON</button>
    </div>
  </div>

  <div class="zoom-hint" id="hint">滚轮缩放探索层次 · 点击节点聚焦</div>

  <canvas id="canvas"></canvas>

  <script>
    // ============================================================
    // Learnable v0.4 — Handwritten Zoomable Knowledge Tree
    // ============================================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const API_BASE = '';

    // Hand-drawn randomness helpers
    const R = (min, max) => Math.random() * (max - min) + min;
    const jitter = (amt) => R(-amt, amt);

    // Camera
    const cam = { x: 0, y: 0, z: 0.3, tx: 0, ty: 0, tz: 0.3 };

    // State
    const nodes = new Map();
    const edges = [];
    let hovered = null;
    let dragging = false;
    let last = {x:0, y:0};
    let anim = false;

    // Warm handwritten palette
    const PALETTE = [
      {bg:'#fff5e6',border:'#e8c9a0',text:'#5a4530',line:'#8a7a60'}, // warm cream
      {bg:'#f0f8e8',border:'#b8d4a0',text:'#3a5a30',line:'#6a8a50'}, // soft green
      {bg:'#e8f0f8',border:'#a0c4e8',text:'#2a4a6a',line:'#5a7a9a'}, // soft blue
      {bg:'#f8e8f0',border:'#e8a0c4',text:'#6a2a4a',line:'#9a5a7a'}, // soft pink
      {bg:'#f8f5e0',border:'#e8d8a0',text:'#5a5000',line:'#8a8050'}, // soft yellow
      {bg:'#f0e8f8',border:'#c4a0e8',text:'#4a2a6a',line:'#7a5a9a'}, // soft purple
    ];

    class Node {
      constructor(id, label, x, y, parent=null, level=0) {
        this.id = id;
        this.label = label;
        this.x = x; this.y = y;
        this.tx = x; this.ty = y;
        this.parent = parent;
        this.level = level;
        this.children = [];
        this.generated = false;
        this.generating = false;
        this.detail = null;
        this.detailLoaded = false;
        this.color = PALETTE[level % PALETTE.length];
        this.seed = Math.random(); // for consistent hand-drawn shape

        this.minZ = Math.max(0.08, 0.25 * level);
        this.maxZ = 4;

        this.ct = {
          label: 0.15,
          brief: 0.7,
          points: 1.1,
          example: 1.6,
        };
      }

      bounds(z) {
        const s = Math.max(0.3, 1 - this.level * 0.08);
        const w = 190 * s;
        const h = (z >= this.ct.points ? 150 : (z >= this.ct.brief ? 75 : 45)) * s;
        return {l:this.x-w/2, t:this.y-h/2, r:this.x+w/2, b:this.y+h/2, w, h, s};
      }

      hit(wx, wy) {
        const b = this.bounds(cam.z);
        return wx>=b.l && wx<=b.r && wy>=b.t && wy<=b.b;
      }
    }

    function layout(parent, count, radius=240) {
      if (count===0) return [];
      const span = Math.min(Math.PI*1.3, Math.PI*2*count/6);
      const start = -Math.PI/2 - span/2;
      return Array.from({length:count}, (_,i)=>({
        x: parent.x + Math.cos(start + span*i/Math.max(count-1,1)) * radius,
        y: parent.y + Math.sin(start + span*i/Math.max(count-1,1)) * radius,
      }));
    }

    // Animation
    function tick() {
      let need = false;
      ['x','y','z'].forEach(k=>{
        const d = cam['t'+k] - cam[k];
        if (Math.abs(d)>0.001) { cam[k] += d*0.08; need = true; }
      });
      for (const n of nodes.values()) {
        if (Math.abs(n.x-n.tx)>0.5) { n.x += (n.tx-n.x)*0.1; need=true; }
        if (Math.abs(n.y-n.ty)>0.5) { n.y += (n.ty-n.y)*0.1; need=true; }
      }
      if (need||anim) { render(); requestAnimationFrame(tick); }
      else anim=false;
    }
    function start() { if(!anim){anim=true; requestAnimationFrame(tick);} }

    // Paper texture generator
    let paperPattern = null;
    function getPaperPattern() {
      if (paperPattern) return paperPattern;
      const pw = 512, ph = 512;
      const pc = document.createElement('canvas');
      pc.width = pw; pc.height = ph;
      const px = pc.getContext('2d');

      // Base paper color
      px.fillStyle = '#faf6f0';
      px.fillRect(0, 0, pw, ph);

      // Fiber noise
      const img = px.getImageData(0, 0, pw, ph);
      for (let i = 0; i < img.data.length; i += 4) {
        const n = (Math.random() - 0.5) * 12;
        img.data[i]   = Math.min(255, Math.max(0, img.data[i] + n));
        img.data[i+1] = Math.min(255, Math.max(0, img.data[i+1] + n));
        img.data[i+2] = Math.min(255, Math.max(0, img.data[i+2] + n));
      }
      px.putImageData(img, 0, 0);

      // Hand-drawn fibers
      px.globalAlpha = 0.04;
      px.strokeStyle = '#8a7a60';
      px.lineWidth = 0.5;
      for (let i = 0; i < 60; i++) {
        const x = Math.random() * pw;
        const y = Math.random() * ph;
        px.beginPath();
        px.moveTo(x, y);
        px.bezierCurveTo(
          x + R(-30, 30), y + R(-30, 30),
          x + R(-30, 30), y + R(-30, 30),
          x + R(-20, 20), y + R(-20, 20)
        );
        px.stroke();
      }

      // Subtle coffee stain spots
      px.globalAlpha = 0.015;
      px.fillStyle = '#a08060';
      for (let i = 0; i < 5; i++) {
        const cx = Math.random() * pw;
        const cy = Math.random() * ph;
        const r = R(20, 60);
        px.beginPath();
        for (let a = 0; a < Math.PI * 2; a += 0.3) {
          const rr = r + R(-5, 5);
          const sx = cx + Math.cos(a) * rr;
          const sy = cy + Math.sin(a) * rr;
          if (a === 0) px.moveTo(sx, sy);
          else px.lineTo(sx, sy);
        }
        px.closePath();
        px.fill();
      }

      paperPattern = ctx.createPattern(pc, 'repeat');
      return paperPattern;
    }

    // Render
    function render() {
      const W = canvas.width = innerWidth;
      const H = canvas.height = innerHeight;
      ctx.clearRect(0,0,W,H);

      // Paper texture background
      ctx.fillStyle = getPaperPattern();
      ctx.fillRect(0,0,W,H);

      ctx.save();
      ctx.translate(W/2+cam.x, H/2+cam.y);
      ctx.scale(cam.z, cam.z);

      drawDotGrid(W,H);

      // Edges
      for (const e of edges) {
        const a=nodes.get(e.a), b=nodes.get(e.b);
        if (!a||!b) continue;
        if (cam.z < Math.max(a.minZ, b.minZ)) continue;
        const op = Math.min(a===hovered||b===hovered?1:0.6, (cam.z-a.minZ)*2, (cam.z-b.minZ)*2);
        if (op<=0) continue;
        ctx.globalAlpha = Math.min(1, op);
        ctx.strokeStyle = a===hovered||b===hovered? '#c49a48' : '#d0c4b0';
        ctx.lineWidth = a===hovered||b===hovered? 2.5 : 1.5;
        ctx.lineCap = 'round';
        drawHandDrawnLine(a.x, a.y, b.x, b.y);
      }
      ctx.globalAlpha = 1;

      // Nodes
      const sorted = Array.from(nodes.values()).sort((a,b)=>a.level-b.level);
      for (const n of sorted) drawNode(n);

      ctx.restore();
    }

    function drawDotGrid(W,H) {
      const step=50, ox=(cam.x+W/2)%step, oy=(cam.y+H/2)%step;
      ctx.fillStyle = 'rgba(180,170,150,0.18)';
      for (let x=-W/2-ox; x<W/2; x+=step) {
        for (let y=-H/2-oy; y<H/2; y+=step) {
          ctx.beginPath();
          ctx.arc(x + jitter(1.5), y + jitter(1.5), 1.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    function drawHandDrawnLine(x1, y1, x2, y2) {
      const midX = (x1+x2)/2 + jitter(15);
      const midY = (y1+y2)/2 + jitter(15) + (y2>y1?30:-30);
      ctx.beginPath();
      ctx.moveTo(x1+jitter(2), y1+jitter(2));
      ctx.quadraticCurveTo(midX, midY, x2+jitter(2), y2+jitter(2));
      ctx.stroke();
    }

    function drawNode(n) {
      const z = cam.z;
      if (z < n.minZ || z > n.maxZ) return;

      const b = n.bounds(z);
      const alpha = Math.min(1, (z - n.minZ) * 3);
      ctx.globalAlpha = alpha;

      // Hand-drawn background
      ctx.fillStyle = n.color.bg;
      handDrawnRect(b.l, b.t, b.w, b.h, 12*b.s, n.seed);
      ctx.fill();

      // Hand-drawn border
      ctx.strokeStyle = n===hovered ? n.color.border : 'rgba(90,70,50,0.15)';
      ctx.lineWidth = n===hovered ? 2.5 : 1.8;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      handDrawnRect(b.l, b.t, b.w, b.h, 12*b.s, n.seed);
      ctx.stroke();

      // Generating indicator
      if (n.generating) {
        ctx.strokeStyle = '#c49a48';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const angle = Date.now()/120 + n.seed*10;
        ctx.arc(n.x+jitter(2), n.y-b.h/2+10*b.s, 4*b.s, angle, angle+5);
        ctx.stroke();
      }

      // Label
      if (z >= n.ct.label) {
        ctx.fillStyle = n.color.text;
        ctx.textAlign = 'center';
        ctx.font = `700 ${15*b.s}px 'Kalam', 'Ma Shan Zheng', cursive`;
        const labelY = n.y - (z>=n.ct.brief?12*b.s:0) + jitter(1);
        ctx.fillText(n.label, n.x+jitter(1.5), labelY);
      }

      // Brief
      if (z >= n.ct.brief && n.detail) {
        ctx.globalAlpha = alpha * 0.75;
        ctx.font = `400 ${11.5*b.s}px 'Kalam', 'Ma Shan Zheng', cursive`;
        const brief = n.detail.definition ? (n.detail.definition.slice(0,42)+(n.detail.definition.length>42?'...':'')) : '';
        ctx.fillText(brief, n.x+jitter(1), n.y + 16*b.s);
      }

      // Key points
      if (z >= n.ct.points && n.detail && n.detail.key_points) {
        ctx.globalAlpha = alpha * 0.8;
        ctx.font = `400 ${10.5*b.s}px 'Kalam', 'Ma Shan Zheng', cursive`;
        n.detail.key_points.slice(0,3).forEach((kp,i)=>{
          const y = n.y + 38*b.s + i*17*b.s;
          // Hand-drawn bullet
          ctx.fillStyle = n.color.border;
          ctx.beginPath();
          ctx.arc(n.x - b.w/2 + 16*b.s + jitter(1), y + jitter(1), 2.5*b.s, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = n.color.text;
          ctx.textAlign = 'left';
          ctx.fillText(kp.slice(0,28)+(kp.length>28?'...':''), n.x - b.w/2 + 24*b.s, y+4*b.s);
        });
        ctx.textAlign = 'center';
      }

      // Example
      if (z >= n.ct.example && n.detail && n.detail.example) {
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillStyle = n.color.text;
        ctx.font = `italic 400 ${9.5*b.s}px 'Kalam', 'Ma Shan Zheng', cursive`;
        const ex = n.detail.example.slice(0,55)+(n.detail.example.length>55?'...':'');
        ctx.fillText(`例：${ex}`, n.x+jitter(1), n.y + b.h/2 - 10*b.s);
      }

      // Expand hint (small hand-drawn star)
      if (!n.generated && !n.generating && z > n.minZ + 0.1) {
        ctx.globalAlpha = alpha * 0.5;
        ctx.fillStyle = '#c49a48';
        drawStar(n.x + b.w/2 - 8*b.s, n.y + b.h/2 - 8*b.s, 5*b.s, n.seed);
      }

      ctx.globalAlpha = 1;
    }

    function handDrawnRect(x, y, w, h, r, seed) {
      const s = seed * 1000;
      const rnd = (i) => Math.sin(s + i * 7.3) * 0.5 + 0.5; // deterministic pseudo-random
      ctx.beginPath();
      const pts = [
        [x+r, y], [x+w-r, y],
        [x+w, y+r], [x+w, y+h-r],
        [x+w-r, y+h], [x+r, y+h],
        [x, y+h-r], [x, y+r],
      ];
      const cps = [
        [x+w-r+rnd(0)*r*0.3, y+jitter(r*0.2)],
        [x+w+jitter(r*0.2), y+r+rnd(1)*r*0.3],
        [x+w+jitter(r*0.2), y+h-r+rnd(2)*r*0.3],
        [x+w-r+rnd(3)*r*0.3, y+h+jitter(r*0.2)],
        [x+r+rnd(4)*r*0.3, y+h+jitter(r*0.2)],
        [x+jitter(r*0.2), y+h-r+rnd(5)*r*0.3],
        [x+jitter(r*0.2), y+r+rnd(6)*r*0.3],
        [x+r+rnd(7)*r*0.3, y+jitter(r*0.2)],
      ];
      ctx.moveTo(pts[0][0]+jitter(2), pts[0][1]+jitter(2));
      for (let i=0; i<8; i++) {
        const next = (i+1)%8;
        const mx = (pts[i][0]+pts[next][0])/2 + jitter(3);
        const my = (pts[i][1]+pts[next][1])/2 + jitter(3);
        ctx.quadraticCurveTo(cps[i][0], cps[i][1], mx, my);
      }
      ctx.closePath();
    }

    function drawStar(cx, cy, r, seed) {
      const s = seed * 100;
      ctx.beginPath();
      for (let i=0; i<5; i++) {
        const angle = (i * 4 * Math.PI / 5) - Math.PI/2 + Math.sin(s+i)*0.1;
        const px = cx + Math.cos(angle) * r + jitter(1);
        const py = cy + Math.sin(angle) * r + jitter(1);
        if (i===0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }

    function toWorld(sx,sy) {
      return {
        x: (sx - innerWidth/2 - cam.x) / cam.z,
        y: (sy - innerHeight/2 - cam.y) / cam.z,
      };
    }

    function findNode(wx,wy) {
      const sorted = Array.from(nodes.values()).sort((a,b)=>b.level-a.level);
      for (const n of sorted) {
        if (cam.z < n.minZ) continue;
        if (n.hit(wx,wy)) return n;
      }
      return null;
    }

    // Events
    canvas.addEventListener('mousedown', e=>{
      const w = toWorld(e.clientX, e.clientY);
      if (findNode(w.x,w.y)) return;
      dragging = true; last = {x:e.clientX, y:e.clientY};
    });

    canvas.addEventListener('mousemove', e=>{
      const w = toWorld(e.clientX, e.clientY);
      const prev = hovered;
      hovered = findNode(w.x, w.y);
      canvas.classList.toggle('cursor-pointer', !!hovered);
      if (hovered !== prev) render();
      if (dragging) {
        cam.tx += e.clientX - last.x;
        cam.ty += e.clientY - last.y;
        last = {x:e.clientX, y:e.clientY};
        start();
      }
    });

    canvas.addEventListener('mouseup', ()=>{ dragging=false; });

    canvas.addEventListener('click', e=>{
      if (dragging) return;
      const w = toWorld(e.clientX, e.clientY);
      const n = findNode(w.x, w.y);
      if (!n) return;
      if (!n.generated && !n.generating) generate(n);
      const targetZ = Math.max(0.5, Math.min(2.2, 0.6 / (n.level + 0.5)));
      cam.tz = targetZ;
      cam.tx = -n.x * targetZ;
      cam.ty = -n.y * targetZ;
      start();
    });

    canvas.addEventListener('wheel', e=>{
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      cam.tz = Math.max(0.05, Math.min(4, cam.tz * factor));
      start();
    }, {passive:false});

    // Generation
    async function generate(parent) {
      if (parent.generated || parent.generating) return;
      parent.generating = true;
      document.getElementById('loading').classList.add('active');
      start();

      try {
        const r1 = await fetch(`${API_BASE}/api/expand`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({topic:parent.label, language:'zh'}),
        });
        if (!r1.ok) throw new Error('expand failed');
        const d1 = await r1.json();
        const items = d1.items || [];

        const pos = layout(parent, items.length);
        const childIds = [];
        for (let i=0; i<items.length; i++) {
          const id = `${parent.id}-${items[i].id||i}`;
          const n = new Node(id, items[i].label, parent.x, parent.y, parent.id, parent.level+1);
          n.tx = pos[i].x; n.ty = pos[i].y;
          nodes.set(id, n);
          edges.push({a:parent.id, b:id});
          parent.children.push(id);
          childIds.push(id);
        }
        parent.generated = true;
        start();

        document.getElementById('loading').querySelector('span').textContent = '记笔中...';
        await Promise.all(childIds.map(async cid=>{
          const cn = nodes.get(cid);
          try {
            const r2 = await fetch(`${API_BASE}/api/detail`, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({topic:cn.label, parent:parent.label, language:'zh'}),
            });
            if (!r2.ok) throw new Error('detail failed');
            const d2 = await r2.json();
            cn.detail = {definition:d2.definition, key_points:d2.key_points, example:d2.example};
            cn.detailLoaded = true;
          } catch(e) {
            cn.detail = {
              definition: `${cn.label}是${parent.label}的重要概念。`,
              key_points: ['核心原理','实际应用','发展趋势'],
              example: `在${parent.label}中，${cn.label}被广泛运用。`,
            };
            cn.detailLoaded = true;
          }
        }));

      } catch(e) {
        console.error(e);
        const mock = [`${parent.label}基础`,`${parent.label}应用`,`${parent.label}进阶`];
        const pos = layout(parent, mock.length);
        mock.forEach((label,i)=>{
          const id = `${parent.id}-m${i}`;
          const n = new Node(id, label, parent.x, parent.y, parent.id, parent.level+1);
          n.tx = pos[i].x; n.ty = pos[i].y;
          n.detail = {definition:`${label}的定义。`, key_points:['要点1','要点2'], example:'实际案例。'};
          n.detailLoaded = true;
          nodes.set(id, n);
          edges.push({a:parent.id, b:id});
          parent.children.push(id);
        });
        parent.generated = true;
        start();
      } finally {
        parent.generating = false;
        document.getElementById('loading').classList.remove('active');
        document.getElementById('loading').querySelector('span').textContent = '正在思考...';
      }
    // Session management
    const sessionBtn = document.getElementById('sessionBtn');
    const sessionPanel = document.getElementById('sessionPanel');
    const sessionClose = document.getElementById('sessionClose');
    const saveBtn = document.getElementById('saveBtn');
    const exportBtn = document.getElementById('exportBtn');
    const sessionList = document.getElementById('sessionList');
    const currentTopic = document.getElementById('currentTopic');
    let currentSessionId = '';

    sessionBtn.addEventListener('click', () => {
      sessionPanel.classList.toggle('open');
      if (sessionPanel.classList.contains('open')) loadSessionList();
    });
    sessionClose.addEventListener('click', () => sessionPanel.classList.remove('open'));

    async function loadSessionList() {
      try {
        const res = await fetch(`${API_BASE}/api/sessions`);
        const sessions = await res.json();
        if (sessions.length === 0) {
          sessionList.innerHTML = '<div class="session-empty">暂无保存的笔记</div>';
          return;
        }
        sessionList.innerHTML = sessions.map(s => `
          <div class="session-item" data-id="${s.id}">
            <div>
              <div class="session-item-title">${s.root_topic}</div>
              <div class="session-item-date">${new Date(s.updated_at*1000).toLocaleDateString()}</div>
            </div>
            <button class="session-item-delete" data-id="${s.id}" title="删除">×</button>
          </div>
        `).join('');
        sessionList.querySelectorAll('.session-item').forEach(el => {
          el.addEventListener('click', e => {
            if (e.target.classList.contains('session-item-delete')) return;
            loadSession(el.dataset.id);
          });
        });
        sessionList.querySelectorAll('.session-item-delete').forEach(btn => {
          btn.addEventListener('click', async e => {
            e.stopPropagation();
            if (!confirm('确定删除这个笔记吗？')) return;
            await fetch(`${API_BASE}/api/delete_session`, {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({session_id: btn.dataset.id}),
            });
            loadSessionList();
          });
        });
      } catch (e) {
        sessionList.innerHTML = '<div class="session-empty">加载失败</div>';
      }
    }

    async function saveCurrent() {
      if (nodes.size === 0) return;
      const root = Array.from(nodes.values()).find(n => n.parent === null);
      if (!root) return;

      const nodeData = Array.from(nodes.values()).map(n => ({
        id: n.id,
        label: n.label,
        parent_id: n.parent,
        level: n.level,
        x: n.x,
        y: n.y,
        zoom_threshold: n.minZ,
        detail: n.detail,
        color_index: n.level % PALETTE.length,
        expanded: n.generated,
      }));
      const edgeData = edges.map(e => ({from_id: e.a, to_id: e.b}));

      const sessionId = currentSessionId || `session_${Date.now()}`;
      currentSessionId = sessionId;

      try {
        await fetch(`${API_BASE}/api/save`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            session_id: sessionId,
            root_topic: root.label,
            nodes: nodeData,
            edges: edgeData,
            camera_x: cam.x,
            camera_y: cam.y,
            camera_zoom: cam.z,
          }),
        });
        showToast('✍️ 笔记已保存');
      } catch (e) {
        showToast('保存失败');
      }
    }

    async function loadSession(sessionId) {
      try {
        const res = await fetch(`${API_BASE}/api/load`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({session_id: sessionId}),
        });
        const data = await res.json();
        if (!data.session) { showToast('加载失败'); return; }

        // Rebuild graph
        nodes.clear(); edges.length = 0;
        currentSessionId = sessionId;

        for (const n of data.nodes) {
          const node = new Node(n.id, n.label, n.x || 0, n.y || 0, n.parent_id, n.level);
          node.detail = n.detail;
          node.detailLoaded = !!n.detail;
          node.generated = n.expanded || false;
          node.x = n.x || 0; node.y = n.y || 0;
          node.tx = n.x || 0; node.ty = n.y || 0;
          nodes.set(n.id, node);
        }
        for (const e of data.edges) {
          edges.push({a: e.from_id, b: e.to_id});
          const parent = nodes.get(e.from_id);
          if (parent) parent.children.push(e.to_id);
        }

        // Restore camera
        if (data.session) {
          cam.tx = data.session.camera_x || 0;
          cam.ty = data.session.camera_y || 0;
          cam.tz = data.session.camera_zoom || 0.3;
        }

        currentTopic.textContent = data.session.root_topic;
        document.getElementById('topic').value = data.session.root_topic;
        sessionPanel.classList.remove('open');
        render(); start();
        showToast(`✍️ 已加载: ${data.session.root_topic}`);
      } catch (e) {
        console.error(e);
        showToast('加载失败');
      }
    }

    async function exportJSON() {
      try {
        const res = await fetch(`${API_BASE}/api/export`);
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `learnable_export_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('✍️ 已导出 JSON');
      } catch (e) {
        showToast('导出失败');
      }
    }

    saveBtn.addEventListener('click', saveCurrent);
    exportBtn.addEventListener('click', exportJSON);

    // Toast helper
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position:fixed; top:20px; right:50%;
        transform:translateX(50%) rotate(-1deg);
        background:#fffdf8; border:2px solid #d4c4a8;
        padding:10px 20px; border-radius:10px;
        font-family:'Kalam','Ma Shan Zheng',cursive;
        font-size:14px; color:#4a4036;
        box-shadow:3px 4px 0 rgba(160,140,110,0.15);
        z-index:100; opacity:0; transition:opacity 0.4s;
      `;
      toast.textContent = msg;
      document.body.appendChild(toast);
      requestAnimationFrame(() => { toast.style.opacity = '1'; });
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 400); }, 2500);
    }

    // Init
    function initRoot(topic) {
      nodes.clear(); edges.length=0; currentSessionId = '';
            const root = new Node('root', topic, 0, 0, null, 0);
      nodes.set('root', root);
      cam.tx = 0; cam.ty = 0; cam.tz = 0.3;
      currentTopic.textContent = topic;
      render(); start();
      setTimeout(()=>generate(root), 400);
    }

    document.getElementById('go').addEventListener('click', ()=>{
      const t = document.getElementById('topic').value.trim();
      if (t) initRoot(t);
    });
    document.getElementById('topic').addEventListener('keydown', e=>{
      if (e.key==='Enter') document.getElementById('go').click();
    });

    window.addEventListener('resize', render);
    render();
    setTimeout(()=>document.getElementById('hint').classList.add('fade'), 5000);
  </script>
</body>
</html>
