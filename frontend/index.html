<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnable — 放大探索，层层深入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7f5f2;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #canvas {
      display: block;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }
    #canvas.cursor-pointer { cursor: pointer; }

    /* Minimal UI */
    .ui {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
    }
    .ui > * { pointer-events: auto; }
    .brand {
      font-size: 20px;
      font-weight: 700;
      color: #3d342b;
      letter-spacing: -0.3px;
    }
    .brand span { color: #d4a853; }
    .search {
      margin-top: 12px;
      display: flex;
      gap: 6px;
    }
    .search input {
      width: 220px;
      padding: 10px 14px;
      border: 1.5px solid #e0d5c8;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      color: #3d342b;
      transition: all 0.2s;
    }
    .search input:focus { border-color: #d4a853; box-shadow: 0 0 0 3px rgba(212,168,83,0.15); }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #d4a853;
      color: #fff;
      transition: all 0.2s;
    }
    .btn:hover { background: #c49a48; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Zoom indicator */
    .zoom-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      color: #9a8e80;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .zoom-hint.fade { opacity: 0; }

    /* Loading dot */
    .loading {
      position: fixed;
      top: 24px;
      right: 24px;
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #9a8e80;
      z-index: 10;
    }
    .loading.active { display: flex; }
    .dot {
      width: 8px; height: 8px;
      background: #d4a853;
      border-radius: 50%;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div class="ui">
    <div class="brand">Learn<span>able</span></div>
    <div class="search">
      <input type="text" id="topic" placeholder="输入主题..." value="机器学习">
      <button class="btn" id="go">开始</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="dot"></div>
    <span>正在思考...</span>
  </div>

  <div class="zoom-hint" id="hint">滚轮缩放探索层次 · 点击节点聚焦</div>

  <canvas id="canvas"></canvas>

  <script>
    // ============================================================
    // Learnable v0.3 — Zoomable Knowledge Tree
    // Core idea: zoom controls visibility, click controls focus
    // ============================================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const API_BASE = '';

    // Camera
    const cam = {
      x: 0, y: 0, z: 0.3,
      tx: 0, ty: 0, tz: 0.3,
    };

    // State
    const nodes = new Map();
    const edges = [];
    let hovered = null;
    let dragging = false;
    let last = {x:0,y:0};
    let anim = false;

    // Colors
    const PALETTE = [
      {bg:'#e8d5c4',border:'#d4b896',text:'#5a4a3a'}, // warm brown
      {bg:'#c8e6c9',border:'#a5d6a7',text:'#2e5c30'}, // soft green
      {bg:'#bbdefb',border:'#90caf9',text:'#1a3c5c'}, // soft blue
      {bg:'#f8bbd0',border:'#f48fb1',text:'#6a1b3d'}, // soft pink
      {bg:'#fff9c4',border:'#fff176',text:'#5c5400'}, // soft yellow
      {bg:'#d1c4e9',border:'#b39ddb',text:'#3c235c'}, // soft purple
    ];

    class Node {
      constructor(id, label, x, y, parent=null, level=0) {
        this.id = id;
        this.label = label;
        this.x = x; this.y = y;
        this.tx = x; this.ty = y;
        this.parent = parent;
        this.level = level;
        this.children = [];
        this.generated = false;
        this.generating = false;
        this.detail = null;
        this.detailLoaded = false;
        this.color = PALETTE[level % PALETTE.length];

        // Visibility: deeper nodes need more zoom
        this.minZ = Math.max(0.08, 0.25 * level);
        this.maxZ = 4;

        // Content thresholds within the node
        this.ct = {
          label: 0.15,        // always show label
          brief: 0.7,         // show short description
          points: 1.1,        // show key points
          example: 1.6,       // show example
        };
      }

      bounds(z) {
        const s = Math.max(0.3, 1 - this.level * 0.08);
        const w = 180 * s;
        const h = (z >= this.ct.points ? 140 : (z >= this.ct.brief ? 70 : 40)) * s;
        return {l:this.x-w/2, t:this.y-h/2, r:this.x+w/2, b:this.y+h/2, w, h, s};
      }

      hit(wx, wy) {
        const b = this.bounds(cam.z);
        return wx>=b.l && wx<=b.r && wy>=b.t && wy<=b.b;
      }
    }

    // Layout — tree-like radial
    function layout(parent, count, radius=220) {
      if (count===0) return [];
      const span = Math.min(Math.PI*1.3, Math.PI*2*count/6);
      const start = -Math.PI/2 - span/2;
      return Array.from({length:count}, (_,i)=>({
        x: parent.x + Math.cos(start + span*i/Math.max(count-1,1)) * radius,
        y: parent.y + Math.sin(start + span*i/Math.max(count-1,1)) * radius,
      }));
    }

    // Animation
    function tick() {
      let need = false;
      ['x','y','z'].forEach(k=>{
        const d = cam['t'+k] - cam[k];
        if (Math.abs(d)>0.001) { cam[k] += d*0.08; need = true; }
      });
      for (const n of nodes.values()) {
        if (Math.abs(n.x-n.tx)>0.5) { n.x += (n.tx-n.x)*0.1; need=true; }
        if (Math.abs(n.y-n.ty)>0.5) { n.y += (n.ty-n.y)*0.1; need=true; }
      }
      if (need||anim) { render(); requestAnimationFrame(tick); }
      else anim=false;
    }
    function start() { if(!anim){anim=true; requestAnimationFrame(tick);} }

    // Render
    function render() {
      const W = canvas.width = innerWidth;
      const H = canvas.height = innerHeight;
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle = '#f7f5f2';
      ctx.fillRect(0,0,W,H);

      ctx.save();
      ctx.translate(W/2+cam.x, H/2+cam.y);
      ctx.scale(cam.z, cam.z);

      // Subtle grid
      drawGrid(W,H);

      // Edges
      for (const e of edges) {
        const a=nodes.get(e.a), b=nodes.get(e.b);
        if (!a||!b) continue;
        if (cam.z < Math.max(a.minZ, b.minZ)) continue;
        const op = Math.min(a===hovered||b===hovered?1:0.6, (cam.z-a.minZ)*2, (cam.z-b.minZ)*2);
        if (op<=0) continue;
        ctx.globalAlpha = Math.min(1, op);
        ctx.strokeStyle = a===hovered||b===hovered? '#d4a853' : '#d8cfc4';
        ctx.lineWidth = a===hovered||b===hovered? 2.5 : 1.2;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        const mx=(a.x+b.x)/2, my=(a.y+b.y)/2 + (b.y>a.y?40:-40);
        ctx.quadraticCurveTo(mx, my, b.x, b.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Nodes — back to front by level
      const sorted = Array.from(nodes.values()).sort((a,b)=>a.level-b.level);
      for (const n of sorted) drawNode(n);

      ctx.restore();
    }

    function drawGrid(W,H) {
      const step=50, ox=(cam.x+W/2)%step, oy=(cam.y+H/2)%step;
      ctx.strokeStyle='rgba(200,190,175,0.12)';
      ctx.lineWidth=1;
      for (let x=-W/2-ox; x<W/2; x+=step) { ctx.beginPath(); ctx.moveTo(x,-H/2); ctx.lineTo(x,H/2); ctx.stroke(); }
      for (let y=-H/2-oy; y<H/2; y+=step) { ctx.beginPath(); ctx.moveTo(-W/2,y); ctx.lineTo(W/2,y); ctx.stroke(); }
    }

    function drawNode(n) {
      const z = cam.z;
      if (z < n.minZ || z > n.maxZ) return;

      const b = n.bounds(z);
      const alpha = Math.min(1, (z - n.minZ) * 3);
      ctx.globalAlpha = alpha;

      // Shadow
      ctx.shadowColor='rgba(60,50,40,0.06)';
      ctx.shadowBlur=10*z; ctx.shadowOffsetY=4*z;

      // Body
      ctx.fillStyle = n.color.bg;
      roundRect(b.l, b.t, b.w, b.h, 10*b.s);
      ctx.fill();
      ctx.shadowColor='transparent';

      // Border
      ctx.strokeStyle = n===hovered ? n.color.border : 'rgba(0,0,0,0.06)';
      ctx.lineWidth = n===hovered ? 2 : 1;
      roundRect(b.l, b.t, b.w, b.h, 10*b.s);
      ctx.stroke();

      // Loading indicator
      if (n.generating) {
        ctx.fillStyle = '#d4a853';
        ctx.beginPath();
        const angle = Date.now()/150;
        ctx.arc(n.x+b.w/2-8*b.s, n.y-b.h/2+8*b.s, 3*b.s, angle, angle+4);
        ctx.stroke();
      }

      // Label — always at brief+ zoom
      if (z >= n.ct.label) {
        ctx.fillStyle = n.color.text;
        ctx.textAlign = 'center';
        ctx.font = `600 ${14*b.s}px sans-serif`;
        ctx.fillText(n.label, n.x, n.y - (z>=n.ct.brief?10*b.s:0));
      }

      // Brief description
      if (z >= n.ct.brief && n.detail) {
        ctx.fillStyle = n.color.text;
        ctx.globalAlpha = alpha * 0.7;
        ctx.font = `400 ${11*b.s}px sans-serif`;
        const brief = n.detail.definition ? (n.detail.definition.slice(0,40)+(n.detail.definition.length>40?'...':'')) : '';
        ctx.fillText(brief, n.x, n.y + 14*b.s);
      }

      // Key points
      if (z >= n.ct.points && n.detail && n.detail.key_points) {
        ctx.globalAlpha = alpha * 0.85;
        ctx.font = `400 ${10*b.s}px sans-serif`;
        n.detail.key_points.slice(0,3).forEach((kp,i)=>{
          const y = n.y + 32*b.s + i*16*b.s;
          ctx.fillStyle = '#d4a853';
          ctx.beginPath();
          ctx.arc(n.x - b.w/2 + 14*b.s, y, 2*b.s, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = n.color.text;
          ctx.textAlign = 'left';
          ctx.fillText(kp.slice(0,25)+(kp.length>25?'...':''), n.x - b.w/2 + 22*b.s, y+3*b.s);
        });
        ctx.textAlign = 'center';
      }

      // Example
      if (z >= n.ct.example && n.detail && n.detail.example) {
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillStyle = n.color.text;
        ctx.font = `italic 400 ${9*b.s}px sans-serif`;
        const ex = n.detail.example.slice(0,50)+(n.detail.example.length>50?'...':'');
        ctx.fillText(`例：${ex}`, n.x, n.y + b.h/2 - 10*b.s);
      }

      // Expand hint (small dot when children not yet generated)
      if (!n.generated && !n.generating && z > n.minZ + 0.1) {
        ctx.globalAlpha = alpha * 0.5;
        ctx.fillStyle = '#d4a853';
        ctx.beginPath();
        ctx.arc(n.x + b.w/2 - 6*b.s, n.y + b.h/2 - 6*b.s, 3*b.s, 0, Math.PI*2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
    }

    function roundRect(x,y,w,h,r) {
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
      ctx.arcTo(x+w,y,x+w,y+r,r);
      ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
      ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
      ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
      ctx.closePath();
    }

    // Coordinate transform
    function toWorld(sx,sy) {
      return {
        x: (sx - innerWidth/2 - cam.x) / cam.z,
        y: (sy - innerHeight/2 - cam.y) / cam.z,
      };
    }

    function findNode(wx,wy) {
      // Check front-to-back (reverse level order)
      const sorted = Array.from(nodes.values()).sort((a,b)=>b.level-a.level);
      for (const n of sorted) {
        if (cam.z < n.minZ) continue;
        if (n.hit(wx,wy)) return n;
      }
      return null;
    }

    // Interaction
    canvas.addEventListener('mousedown', e=>{
      const w = toWorld(e.clientX, e.clientY);
      if (findNode(w.x,w.y)) return;
      dragging = true; last = {x:e.clientX, y:e.clientY};
    });

    canvas.addEventListener('mousemove', e=>{
      const w = toWorld(e.clientX, e.clientY);
      const prev = hovered;
      hovered = findNode(w.x, w.y);
      canvas.classList.toggle('cursor-pointer', !!hovered);
      if (hovered !== prev) render();

      if (dragging) {
        cam.tx += e.clientX - last.x;
        cam.ty += e.clientY - last.y;
        last = {x:e.clientX, y:e.clientY};
        start();
      }
    });

    canvas.addEventListener('mouseup', ()=>{ dragging=false; });

    canvas.addEventListener('click', e=>{
      if (dragging) return;
      const w = toWorld(e.clientX, e.clientY);
      const n = findNode(w.x, w.y);
      if (!n) return;

      // Generate children if not yet
      if (!n.generated && !n.generating) {
        generate(n);
      }

      // Zoom to show this node and its children
      const targetZ = Math.max(0.5, Math.min(2.2, 0.6 / (n.level + 0.5)));
      cam.tz = targetZ;
      cam.tx = -n.x * targetZ;
      cam.ty = -n.y * targetZ;
      start();
    });

    canvas.addEventListener('wheel', e=>{
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      cam.tz = Math.max(0.05, Math.min(4, cam.tz * factor));
      start();
    }, {passive:false});

    // Generation
    async function generate(parent) {
      if (parent.generated || parent.generating) return;
      parent.generating = true;
      document.getElementById('loading').classList.add('active');
      start();

      try {
        // Step 1: get item labels
        const r1 = await fetch(`${API_BASE}/api/expand`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({topic:parent.label, language:'zh'}),
        });
        if (!r1.ok) throw new Error('expand failed');
        const d1 = await r1.json();
        const items = d1.items || [];

        // Create child nodes
        const pos = layout(parent, items.length);
        const childIds = [];
        for (let i=0; i<items.length; i++) {
          const id = `${parent.id}-${items[i].id||i}`;
          const n = new Node(id, items[i].label, parent.x, parent.y, parent.id, parent.level+1);
          n.tx = pos[i].x; n.ty = pos[i].y;
          nodes.set(id, n);
          edges.push({a:parent.id, b:id});
          parent.children.push(id);
          childIds.push(id);
        }
        parent.generated = true;
        start();

        // Step 2: concurrent detail loading
        document.getElementById('loading').querySelector('span').textContent = '加载详情...';
        await Promise.all(childIds.map(async cid=>{
          const cn = nodes.get(cid);
          try {
            const r2 = await fetch(`${API_BASE}/api/detail`, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({topic:cn.label, parent:parent.label, language:'zh'}),
            });
            if (!r2.ok) throw new Error('detail failed');
            const d2 = await r2.json();
            cn.detail = {definition:d2.definition, key_points:d2.key_points, example:d2.example};
            cn.detailLoaded = true;
          } catch(e) {
            cn.detail = {
              definition: `${cn.label}是${parent.label}的重要概念。`,
              key_points: ['核心原理','实际应用','发展趋势'],
              example: `在${parent.label}中，${cn.label}被广泛运用。`,
            };
            cn.detailLoaded = true;
          }
        }));

      } catch(e) {
        console.error(e);
        // Fallback
        const mock = [`${parent.label}基础`,`${parent.label}应用`,`${parent.label}进阶`];
        const pos = layout(parent, mock.length);
        mock.forEach((label,i)=>{
          const id = `${parent.id}-m${i}`;
          const n = new Node(id, label, parent.x, parent.y, parent.id, parent.level+1);
          n.tx = pos[i].x; n.ty = pos[i].y;
          n.detail = {definition:`${label}的定义。`, key_points:['要点1','要点2'], example:'实际案例。'};
          n.detailLoaded = true;
          nodes.set(id, n);
          edges.push({a:parent.id, b:id});
          parent.children.push(id);
        });
        parent.generated = true;
        start();
      } finally {
        parent.generating = false;
        document.getElementById('loading').classList.remove('active');
        document.getElementById('loading').querySelector('span').textContent = '正在思考...';
      }
    }

    // Init
    function initRoot(topic) {
      nodes.clear(); edges.length=0;
      const root = new Node('root', topic, 0, 0, null, 0);
      nodes.set('root', root);
      cam.tx = 0; cam.ty = 0; cam.tz = 0.3;
      render(); start();
      setTimeout(()=>generate(root), 400);
    }

    document.getElementById('go').addEventListener('click', ()=>{
      const t = document.getElementById('topic').value.trim();
      if (t) initRoot(t);
    });
    document.getElementById('topic').addEventListener('keydown', e=>{
      if (e.key==='Enter') document.getElementById('go').click();
    });

    window.addEventListener('resize', render);
    render();

    // Hide hint after 5s
    setTimeout(()=>document.getElementById('hint').classList.add('fade'), 5000);
  </script>
</body>
</html>
